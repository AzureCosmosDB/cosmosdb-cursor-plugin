name: Sync skills from cosmosdb-agent-kit

on:
  schedule:
    # Run weekly on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Clone upstream agent-kit (sparse)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/AzureCosmosDB/cosmosdb-agent-kit.git \
            _upstream
          cd _upstream
          git sparse-checkout set skills/cosmosdb-best-practices

      - name: Sync skills directory
        run: |
          # Remove current skills content
          rm -rf skills/cosmosdb-best-practices

          # Copy fresh content from upstream
          cp -r _upstream/skills/cosmosdb-best-practices skills/cosmosdb-best-practices

          # Clean up
          rm -rf _upstream

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync skills from cosmosdb-agent-kit"
          title: "chore: sync skills from cosmosdb-agent-kit"
          body: |
            Automated sync of `skills/cosmosdb-best-practices/` from
            [AzureCosmosDB/cosmosdb-agent-kit](https://github.com/AzureCosmosDB/cosmosdb-agent-kit).

            This PR was created automatically by the `sync-agent-kit` workflow.
          branch: chore/sync-agent-kit
          delete-branch: true
          labels: dependencies, automated
