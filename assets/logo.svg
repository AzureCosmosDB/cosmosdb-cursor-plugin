<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="cosmosGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#50E6FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#cosmosGrad)"/>
  <!-- Cosmos DB icon - stylized atom/orbits -->
  <circle cx="64" cy="64" r="8" fill="white"/>
  <!-- Orbit 1 -->
  <ellipse cx="64" cy="64" rx="36" ry="14" stroke="white" stroke-width="3" fill="none" transform="rotate(0 64 64)"/>
  <!-- Orbit 2 -->
  <ellipse cx="64" cy="64" rx="36" ry="14" stroke="white" stroke-width="3" fill="none" transform="rotate(60 64 64)"/>
  <!-- Orbit 3 -->
  <ellipse cx="64" cy="64" rx="36" ry="14" stroke="white" stroke-width="3" fill="none" transform="rotate(120 64 64)"/>
  <!-- Small orbital dots -->
  <circle cx="100" cy="64" r="4" fill="white"/>
  <circle cx="46" cy="33" r="4" fill="white"/>
  <circle cx="46" cy="95" r="4" fill="white"/>
</svg>
